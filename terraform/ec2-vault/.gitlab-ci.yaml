variables:
  TERRAFORM_ACTION: apply
  TF_IN_AUTOMATION: "true"

stages:
  - validation
  - planning
  - action

Config files Validation_for_vault:
  stage: validation
  tags:
    - terraform
  rules:
    - changes:
        - terraform/ec2-vault/**/*
      when: always
    - when: never
  before_script:
    - cd terraform/ec2-vault
    - terraform --version
    - terraform init
  script:
    - terraform validate

planning_for_vault:
  stage: planning
  tags:
    - terraform
  rules:
    - changes:
        - terraform/ec2-vault/**/*
      when: always
    - when: never
  before_script:
    - cd terraform/ec2-vault
    - terraform --version
    - terraform init
  script:
    - terraform plan

apply_job_for_vault:
  stage: action
  tags:
    - terraform
  rules:
    - if: '$TERRAFORM_ACTION == "apply"'
      changes:
        - terraform/ec2-vault/**/*
      when: manual
    - when: never
  before_script:
    - cd terraform/ec2-vault
    - terraform --version
    - terraform init
  script:
    - terraform apply -auto-approve

destroy_job_for_vault:
  stage: action
  tags:
    - terraform
  rules:
    - if: '$TERRAFORM_ACTION == "destroy"'
      changes:
        - terraform/ec2-vault/**/*
      when: manual
    - when: never
  before_script:
    - cd terraform/ec2-vault
    - terraform --version
    - terraform init
  script:
    - terraform destroy -auto-approve
