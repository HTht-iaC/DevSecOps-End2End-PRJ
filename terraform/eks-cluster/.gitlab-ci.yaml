variables:
  TERRAFORM_ACTION: apply
  TF_IN_AUTOMATION: "true"
  VAULT_ADDR: "https://10.0.0.11:8200"

stages:
  - validation
  - planning
  - action

Config files Validation_for_eks:
  stage: validation
  tags:
    - terraform
  rules:
    - changes:
        - terraform/eks-cluster/**/*
      when: always
    - when: never
  before_script:
    - cd terraform/eks-cluster
    - terraform --version
    - terraform init
  script:
    - terraform validate

planning_for_eks:
  stage: planning
  tags:
    - terraform
  rules:
    - changes:
        - terraform/eks-cluster/**/*
      when: always
    - when: never
  before_script:
    - cd terraform/eks-cluster
    - terraform --version
    - VAULT_TOKEN=$(vault write -field=token auth/approle/login role_id=$VAULT_ROLE_ID secret_id=$VAULT_SECRET_ID)
    - export VAULT_TOKEN
    - terraform init
  script:
    - vault kv get -format=json secret/terraform/eks | jq -r '.data.data | to_entries[] | "\(.key)=\"\(.value)\""' > $ENV.tfvars
    - terraform plan -var-file="$ENV.tfvars"

apply_job_for_eks:
  stage: action
  tags:
    - terraform
  rules:
    - if: '$TERRAFORM_ACTION == "apply"'
      changes:
        - terraform/eks-cluster/**/*
      when: manual
    - when: never
  before_script:
    - cd terraform/eks-cluster
    - terraform --version
    - VAULT_TOKEN=$(vault write -field=token auth/approle/login role_id=$VAULT_ROLE_ID secret_id=$VAULT_SECRET_ID)
    - export VAULT_TOKEN
    - terraform init
  script:
    - vault kv get -format=json secret/terraform/eks | jq -r '.data.data | to_entries[] | "\(.key)=\"\(.value)\""' > $ENV.tfvars
    - terraform apply -auto-approve -var-file="$ENV.tfvars"

destroy_job_for_eks:
  stage: action
  tags:
    - terraform
  rules:
    - if: '$TERRAFORM_ACTION == "destroy"'
      changes:
        - terraform/eks-cluster/**/*
      when: manual
    - when: never
  before_script:
    - cd terraform/eks-cluster
    - terraform --version
    - VAULT_TOKEN=$(vault write -field=token auth/approle/login role_id=$VAULT_ROLE_ID secret_id=$VAULT_SECRET_ID)
    - export VAULT_TOKEN
    - terraform init
  script:
    - vault kv get -format=json secret/terraform/eks | jq -r '.data.data | to_entries[] | "\(.key)=\"\(.value)\""' > $ENV.tfvars
    - terraform destroy -auto-approve -var-file="$ENV.tfvars"
