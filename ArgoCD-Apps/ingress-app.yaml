apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/HTht-iaC/DevSecOps-End2End-PRJ.git'
    targetRevision: HEAD
    path: KuberMani/mani/ingress
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default

  syncPolicy:
    syncOptions: []

